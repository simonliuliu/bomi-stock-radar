<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bomi 美股风向站</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{
      --bg:#07101b;--bg2:#0b1627;--panel:rgba(15,25,43,.88);--panel2:rgba(20,35,60,.94);
      --line:rgba(255,255,255,.08);--text:#edf4ff;--muted:#9db1d2;--blue:#69a8ff;--green:#27d17f;--red:#ff6b6b;--gold:#ffd166;
    }
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at top left, rgba(73,121,255,.2), transparent 24%),linear-gradient(180deg,var(--bg),#091423 60%, #08111f);} 
    .wrap{max-width:1400px;margin:0 auto;padding:14px}
    .hero{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,rgba(17,30,52,.96),rgba(10,18,31,.96));backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 16px 40px rgba(0,0,0,.25);margin-bottom:14px}
    h1{margin:0;font-size:clamp(22px,4vw,32px);letter-spacing:-0.02em} .muted{color:var(--muted)} .hero p{margin:6px 0 0;line-height:1.5;font-size:13px}
    .hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
    .hero-meta{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .chips,.toolbar,.tabs{display:flex;gap:8px;flex-wrap:wrap}.chips{margin-top:10px}.toolbar{margin-top:14px}.tabs{margin-top:12px}
    .chip,.tab{padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);font-size:12px}
    .tab{cursor:pointer}.tab.active{background:rgba(105,168,255,.18);border-color:rgba(105,168,255,.35);color:#fff}
    input,select{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--line);border-radius:14px;padding:12px 14px;min-height:44px;outline:none}
    input{flex:1 1 260px} select{flex:0 0 170px}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
    .card{grid-column:span 12;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 14px 32px rgba(0,0,0,.2)}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.metric{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:14px}.metric .k{font-size:12px;color:var(--muted)}.metric .v{font-size:28px;font-weight:800;margin-top:8px}.metric .n{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}
    .section-title{display:flex;justify-content:space-between;gap:10px;align-items:flex-end;margin-bottom:12px}.section-title h2{margin:0;font-size:20px}.section-title p{margin:0;color:var(--muted);font-size:13px}
    .chart-card{grid-column:span 12}.chart-wrap{position:relative;height:300px}
    .stock-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px}
    .stock-card{background:linear-gradient(180deg,rgba(17,28,48,.98),rgba(11,19,33,.98));border:1px solid var(--line);border-radius:18px;padding:16px}
    .head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.ticker{font-size:12px;color:var(--blue);font-weight:800;letter-spacing:.08em}.name{margin-top:4px;font-size:18px;font-weight:800}.price{font-size:28px;font-weight:900}.date{font-size:12px;color:var(--muted);margin-top:6px}
    .badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.badge{font-size:11px;border-radius:999px;padding:6px 10px;background:rgba(255,255,255,.04);border:1px solid var(--line)}
    .perf{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.perf-item{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px;padding:10px}.perf-item .k{font-size:11px;color:var(--muted)}.perf-item .v{margin-top:5px;font-size:18px;font-weight:800}
    .meta{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);display:grid;gap:8px}.row{display:flex;justify-content:space-between;gap:10px;font-size:13px}.row span:first-child{color:var(--muted)}
    .ace{margin-top:14px;background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.18);padding:12px;border-radius:14px}.ace b{color:var(--gold)}
    .events{margin-top:14px}.events h4{margin:0 0 8px;font-size:14px}.events ul{margin:0;padding-left:18px}.events li{margin:7px 0;line-height:1.5}
    .rank-list{display:grid;gap:10px}.rank{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04)}
    .rank-left{display:flex;align-items:center;gap:10px}.num{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:rgba(105,168,255,.18);color:#fff;font-weight:800}
    .pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--gold)}
    .footer{font-size:12px;color:var(--muted);line-height:1.7;text-align:center;margin:20px 0 10px}
    @media (max-width: 900px){.summary{grid-template-columns:repeat(2,1fr)}}
    @media (max-width: 640px){.wrap{padding:10px}.hero{padding:14px;border-radius:18px}.hero-top{flex-direction:column;align-items:flex-start}.hero-meta{justify-content:flex-start}.summary{grid-template-columns:1fr}.price{font-size:24px}.name{font-size:16px}.section-title{flex-direction:column;align-items:flex-start}.chart-wrap{height:260px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-top">
      <div>
        <h1>Bomi Stock Radar</h1>
        <p class="muted">Track themes, leaders and early-positioning opportunities.</p>
      </div>
      <div class="hero-meta">
        <div class="chip" id="updatedAt">加载中...</div>
        <div class="chip">Live Dashboard</div>
      </div>
    </div>
    <div class="toolbar">
      <input id="search" placeholder="搜索代码 / 公司名 / 主题，例如 RKLB / 卫星 / 中国卫通" />
      <select id="marketFilter">
        <option value="ALL">全部市场</option>
        <option value="US">只看美股</option>
        <option value="CN">只看A股</option>
      </select>
      <select id="themeFilter">
        <option value="ALL">全部主题</option>
      </select>
      <select id="sortBy">
        <option value="focus">按关注度</option>
        <option value="y1">按近1年涨幅</option>
        <option value="m1">按近1月涨幅</option>
        <option value="ytd">按YTD涨幅</option>
        <option value="price">按最新价</option>
      </select>
    </div>
    <div class="tabs">
      <div class="tab active" data-view="overview">总览</div>
      <div class="tab" data-view="leaders">关注榜单</div>
      <div class="tab" data-view="cards">全部公司</div>
      <div class="tab" data-view="ace">ACE观点</div>
    </div>
  </div>

  <div id="app"></div>
  <div class="footer">当前为可升级版本地动态站点。下一步可接入实时数据源、定时刷新、外网部署、提醒系统。</div>
</div>

<script>
let DATA = null;
const app = document.getElementById('app');
const searchEl = document.getElementById('search');
const marketEl = document.getElementById('marketFilter');
const themeEl = document.getElementById('themeFilter');
const sortEl = document.getElementById('sortBy');
let activeView = 'overview';

function cls(v){ return v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu'; }
function pct(v){ const s = v > 0 ? '+' : ''; return `${s}${v.toFixed(2)}%`; }
function by(arr,key){ return [...arr].sort((a,b)=>(b[key]??0)-(a[key]??0)); }
function filteredStocks(){
  const q = searchEl.value.trim().toLowerCase();
  const market = marketEl.value;
  const theme = themeEl.value;
  return DATA.stocks.filter(s => {
    const t = `${s.ticker} ${s.name} ${s.theme.join(' ')} ${s.ace}`.toLowerCase();
    return (market==='ALL'||s.region===market) && (theme==='ALL'||s.theme.includes(theme)) && (!q||t.includes(q));
  });
}
function topByFocus(list){ return by(list,'focus').slice(0,5); }
function topByMomentum(list){ return by(list,'m1').slice(0,5); }
function strongestThemes(list){
  const m = {};
  list.forEach(s => s.theme.forEach(t => m[t] = (m[t]||0)+1));
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,6);
}
function overviewHTML(list){
  const us = list.filter(x=>x.region==='US');
  const cn = list.filter(x=>x.region==='CN');
  const leaders = topByFocus(list);
  const momentum = topByMomentum(list);
  const themes = strongestThemes(list);
  return `
  <div class="grid">
    <div class="card">
      <div class="section-title"><div><h2>Market Overview</h2><p>Core signals at a glance</p></div></div>
      <div class="summary">
        <div class="metric"><div class="k">Coverage</div><div class="v">${list.length}</div><div class="n">Tracked names</div></div>
        <div class="metric"><div class="k">US</div><div class="v">${us.length}</div><div class="n">Primary growth & theme names</div></div>
        <div class="metric"><div class="k">CN</div><div class="v">${cn.length}</div><div class="n">Satellite & aerospace chain</div></div>
        <div class="metric"><div class="k">Top Focus</div><div class="v">${leaders[0]?.ticker || '--'}</div><div class="n">Highest-priority name now</div></div>
      </div>
    </div>
    <div class="card chart-card">
      <div class="section-title"><div><h2>关注度 Top 5</h2><p>按我为你整理的追踪优先级排序</p></div></div>
      <div class="chart-wrap"><canvas id="focusChart"></canvas></div>
    </div>
    <div class="card chart-card">
      <div class="section-title"><div><h2>近1月涨幅 Top 5</h2><p>看短线最强的太空股</p></div></div>
      <div class="chart-wrap"><canvas id="m1Chart"></canvas></div>
    </div>
    <div class="card">
      <div class="section-title"><div><h2>热门主题</h2><p>当前样本最常出现的主题分类</p></div></div>
      <div class="badges">${themes.map(([t,n])=>`<span class="badge">${t} · ${n}</span>`).join('')}</div>
    </div>
  </div>`;
}
function ranksHTML(list){
  const focus = topByFocus(list);
  const momentum = topByMomentum(list);
  return `
  <div class="grid">
    <div class="card"><div class="section-title"><div><h2>最值得关注 Top 5</h2><p>综合主题、走势、代表性与ACE观点</p></div></div><div class="rank-list">${focus.map((s,i)=>rankHTML(s,i+1,'focus')).join('')}</div></div>
    <div class="card"><div class="section-title"><div><h2>最近最强势 Top 5</h2><p>按近1月涨幅排序</p></div></div><div class="rank-list">${momentum.map((s,i)=>rankHTML(s,i+1,'m1')).join('')}</div></div>
  </div>`;
}
function rankHTML(s,i,key){
  const val = key==='focus' ? `${s.focus.toFixed(1)} / 10` : pct(s.m1);
  return `<div class="rank"><div class="rank-left"><div class="num">${i}</div><div><div><b>${s.ticker}</b> · ${s.name}</div><div class="muted" style="font-size:12px;margin-top:4px">${s.theme.join(' / ')}</div></div></div><div class="${key==='focus'?'neu':cls(s.m1)}" style="font-weight:800">${val}</div></div>`;
}
function cardsHTML(list){
  return `<div class="card"><div class="section-title"><div><h2>全部公司</h2><p>可搜索、筛选、排序</p></div><p>共 ${list.length} 只</p></div><div class="stock-grid">${list.map(cardHTML).join('')}</div></div>`;
}
function cardHTML(s){
  return `<div class="stock-card">
    <div class="head"><div><div class="ticker">${s.region} · ${s.ticker}</div><div class="name">${s.name}</div></div><div style="text-align:right"><div class="price">${s.price.toFixed(2)}</div><div class="date">${s.date}</div></div></div>
    <div class="badges">${s.theme.map(t=>`<span class="badge">${t}</span>`).join('')}</div>
    <div class="perf">
      <div class="perf-item"><div class="k">近1月</div><div class="v ${cls(s.m1)}">${pct(s.m1)}</div></div>
      <div class="perf-item"><div class="k">YTD</div><div class="v ${cls(s.ytd)}">${pct(s.ytd)}</div></div>
      <div class="perf-item"><div class="k">近1年</div><div class="v ${cls(s.y1)}">${pct(s.y1)}</div></div>
    </div>
    <div class="meta">
      <div class="row"><span>52周高点</span><span>${s.high52.toFixed(2)}</span></div>
      <div class="row"><span>52周低点</span><span>${s.low52.toFixed(2)}</span></div>
      <div class="row"><span>距历史高点</span><span class="${cls(s.drawdown)}">${pct(s.drawdown)}</span></div>
      <div class="row"><span>关注度</span><span>${s.focus.toFixed(1)} / 10</span></div>
    </div>
    <div class="ace"><b>ACE观点：</b> ${s.ace}</div>
    <div class="events"><h4>最近大事件 / 催化剂</h4><ul>${s.events.map(e=>`<li>${e}</li>`).join('')}</ul></div>
  </div>`;
}
function aceHTML(list){
  const sorted = by(list,'focus');
  return `<div class="card"><div class="section-title"><div><h2>ACE 观点专区</h2><p>重点整理频道中高频提及与强弱态度</p></div></div><div class="stock-grid">${sorted.map(s=>`<div class="stock-card"><div class="ticker">${s.ticker}</div><div class="name">${s.name}</div><div class="ace" style="margin-top:12px"><b>ACE观点：</b> ${s.ace}</div><div class="events"><h4>为什么要盯它</h4><ul>${s.events.map(e=>`<li>${e}</li>`).join('')}</ul></div></div>`).join('')}</div></div>`;
}
function render(){
  const list = by(filteredStocks(), sortEl.value);
  const map = {overview:overviewHTML, leaders:ranksHTML, cards:cardsHTML, ace:aceHTML};
  app.innerHTML = map[activeView](list);
  if(activeView==='overview') drawCharts(list);
}
function drawCharts(list){
  const focus = topByFocus(list), m1 = topByMomentum(list);
  new Chart(document.getElementById('focusChart'), {type:'bar', data:{labels:focus.map(x=>x.ticker), datasets:[{label:'关注度', data:focus.map(x=>x.focus), backgroundColor:'rgba(105,168,255,.7)', borderRadius:8}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{color:'#dfe9ff'}}, y:{ticks:{color:'#9db1d2'}, grid:{color:'rgba(255,255,255,.06)'}}}}});
  new Chart(document.getElementById('m1Chart'), {type:'bar', data:{labels:m1.map(x=>x.ticker), datasets:[{label:'近1月涨幅%', data:m1.map(x=>x.m1), backgroundColor:'rgba(39,209,127,.7)', borderRadius:8}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{color:'#dfe9ff'}}, y:{ticks:{color:'#9db1d2'}, grid:{color:'rgba(255,255,255,.06)'}}}}});
}
async function init(){
  DATA = await fetch('./data/stocks.json?_=' + Date.now()).then(r=>r.json());
  document.getElementById('updatedAt').textContent = `最近更新：${DATA.meta.updated_at}`;
  const themes = [...new Set(DATA.stocks.flatMap(s=>s.theme))].sort();
  themeEl.innerHTML = '<option value="ALL">全部主题</option>' + themes.map(t=>`<option value="${t}">${t}</option>`).join('');
  render();
}
searchEl.addEventListener('input', render); marketEl.addEventListener('change', render); themeEl.addEventListener('change', render); sortEl.addEventListener('change', render);
document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => { document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); tab.classList.add('active'); activeView = tab.dataset.view; render(); }));
init();
</script>
</body>
</html>
